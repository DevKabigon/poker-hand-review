<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Confirm your sign up</title>
  </head>
  <body style="margin:0;padding:0;background:#f7f7f8;font-family:Arial,sans-serif;color:#111827;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="padding:24px 12px;">
      <tr>
        <td align="center">
          <table
            role="presentation"
            width="100%"
            cellspacing="0"
            cellpadding="0"
            style="max-width:480px;background:#ffffff;border:1px solid #e5e7eb;border-radius:12px;overflow:hidden;"
          >
            <tr>
              <td
                style="padding:14px 24px;background:linear-gradient(90deg,#00bc7d 0%,#8c52ff 100%);color:#ffffff;"
              >
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0">
                  <tr>
                    <td style="font-size:16px;font-weight:800;letter-spacing:0.2px;">
                      Poker Hand Review
                    </td>
                    <td align="right" style="font-size:12px;opacity:0.9;">
                      Verify Email
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td style="padding:24px;">
                <h1 style="margin:0 0 10px 0;font-size:20px;line-height:1.3;">Confirm your sign up</h1>
                <p style="margin:0 0 18px 0;font-size:14px;line-height:1.6;color:#4b5563;">
                  Tap the button below to verify your email address.
                </p>
                <a
                  href="{{ .ConfirmationURL }}"
                  style="display:inline-block;background:#00bc7d;color:#ffffff;text-decoration:none;font-weight:700;font-size:14px;padding:11px 16px;border-radius:10px;"
                >
                  Confirm email
                </a>
                <p style="margin:18px 0 0 0;font-size:12px;line-height:1.6;color:#6b7280;word-break:break-all;">
                  If the button does not work, use this link:<br />
                  <a href="{{ .ConfirmationURL }}" style="color:#8c52ff;">{{ .ConfirmationURL }}</a>
                </p>
                <p style="margin:18px 0 0 0;font-size:12px;line-height:1.6;color:#9ca3af;">
                  You received this email because a sign-up was requested for this address.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
